name: Feishu Notification

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - closed
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message to Feishu
        env:
          WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK }}
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          EVENT_TYPE: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK secret not set, skipping notification"
            exit 0
          fi

          send_notification() {
            local TITLE="$1"
            local BODY="$2"
            PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg repo "$REPO" \
              --arg body "$BODY" \
              '{
                msg_type: "interactive",
                card: {
                  header: {
                    title: {
                      tag: "plain_text",
                      content: $title
                    },
                    template: "blue"
                  },
                  elements: [
                    {
                      tag: "markdown",
                      content: ("**Repo**: " + $repo + "\n" + $body)
                    }
                  ]
                }
              }')
            curl -sf -X POST -H "Content-Type: application/json" \
              -d "$PAYLOAD" "$WEBHOOK_URL" || echo "::warning::Feishu notification failed"
          }

          if [ "$EVENT_TYPE" = "push" ]; then
            echo "$COMMITS_JSON" | jq -c '.[]' | while read -r commit; do
              COMMIT_SHA=$(echo "$commit" | jq -r '.id')
              COMMIT_MSG=$(echo "$commit" | jq -r '.message')
              COMMIT_URL=$(echo "$commit" | jq -r '.url')
              SHORT_SHA="${COMMIT_SHA:0:7}"
              TITLE="Push to main"
              BODY="Actor: ${ACTOR}
              Commit: [${SHORT_SHA}](${COMMIT_URL})
              Message: ${COMMIT_MSG}"
              send_notification "$TITLE" "$BODY"
            done
          elif [ "$EVENT_TYPE" = "pull_request" ]; then
            PR_STATE="${PR_MERGED:-false}"
            if [ "$PR_STATE" = "true" ]; then PR_STATE="merged"; else PR_STATE="opened"; fi
            TITLE="PR #${PR_NUM} ${PR_STATE}"
            BODY="Title: ${PR_TITLE}
            By: ${ACTOR}"
            send_notification "$TITLE" "$BODY"
          else
            TITLE="Manual trigger"
            BODY="By: ${ACTOR}"
            send_notification "$TITLE" "$BODY"
          fi