name: Feishu Notification

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - merged
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message to Feishu
        env:
          WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK secret not set, skipping notification"
            exit 0
          fi

          EVENT_TYPE="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          MSG="${{ github.event.head_commit.message || github.event.pull_request.title || 'manual trigger' }}"

          if [ "$EVENT_TYPE" = "push" ]; then
            TITLE="Push to main"
            BODY="Actor: ${ACTOR}
Commit: ${SHORT_SHA}
Message: ${MSG}"
          elif [ "$EVENT_TYPE" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            PR_STATE="${{ github.event.pull_request.merged && 'merged' || 'opened' }}"
            TITLE="PR #${PR_NUM} ${PR_STATE}"
            BODY="Title: ${MSG}
By: ${ACTOR}"
          else
            TITLE="Manual trigger"
            BODY="By: ${ACTOR}"
          fi

          # Use jq to build the JSON payload safely to avoid escaping issues
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg repo "$REPO" \
            --arg body "$BODY" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {
                    tag: "plain_text",
                    content: $title
                  },
                  template: "blue"
                },
                elements: [
                  {
                    tag: "markdown",
                    content: ("**Repo**: " + $repo + "\n" + $body)
                  }
                ]
              }
            }')

          curl -s -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"