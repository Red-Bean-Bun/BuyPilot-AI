name: Codex Review

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

jobs:
  codex-review:
    # 细粒度管理逻辑：
    # 1. 默认触发：Push 和 PR 均默认执行 AI 审查
    # 2. 免审机制：若 Commit Message (或 PR 标题) 包含 "[no-review]" 标签，则跳过审查
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[no-review]')) ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false && !contains(github.event.pull_request.title, '[no-review]'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}

      - name: Pre-fetch PR refs
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Pre-fetch push base
        if: github.event_name == 'push'
        env:
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            git fetch --no-tags origin "$PUSH_BEFORE_SHA" || true
          fi

      - name: Run Codex Review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: https://www.codexauv.com/v1/responses
          model: gpt-5.4
          effort: xhigh
          sandbox: read-only
          safety-strategy: drop-sudo
          prompt: |
            You are reviewing BuyPilot-AI, a RAG-based multimodal ecommerce shopping assistant.

            Review only the changes introduced by the current GitHub event. Do not rewrite files.
            - If event is `pull_request`, review only the PR diff.
            - If event is `push`, review only the direct push diff.
            - If event is `workflow_dispatch`, review the current checked-out commit.

            Prioritize correctness, contract drift, hidden regressions, security, and missing tests.

            Project rules to keep in mind:
            - Follow CLAUDE.md as the repository development guide.
            - SSE event protocol truth source is doc/prd/01-Android前端PRD.md and doc/prd/02-后端与AgentPRD.md.
            - Preserve the full A2UI envelope fields when touching streaming events.
            - Keep dependencies flowing UI -> Runtime -> Service -> Repo -> Config/Types.
            - Avoid over-engineering; prefer minimal, verifiable fixes.

            Output in Chinese with this structure:
            ## Summary
            - 2-5 bullets summarizing what changed.

            ## Review Findings
            - List findings by severity: P0, P1, P2, P3.
            - Include file paths and line references when possible.
            - If no actionable issues are found, say so clearly.

            Event context:
            Event: ${{ github.event_name }}
            Repository: ${{ github.repository }}
            PR number: ${{ github.event.pull_request.number }}
            PR base SHA: ${{ github.event.pull_request.base.sha }}
            PR head SHA: ${{ github.event.pull_request.head.sha }}
            PR title: ${{ github.event.pull_request.title }}
            Push before SHA: ${{ github.event.before }}
            Push after SHA: ${{ github.sha }}
            Push head commit message:
            ${{ github.event.head_commit.message }}

            Inspect the changes with the matching command set:
            PR:
            git log --oneline ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}
            git diff --stat ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}
            git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}

            Push:
            git log --oneline ${{ github.event.before }}..${{ github.sha }}
            git diff --stat ${{ github.event.before }}..${{ github.sha }}
            git diff ${{ github.event.before }}..${{ github.sha }}

            Manual:
            git show --stat --oneline HEAD
            git show HEAD

  post-pr-review:
    needs: codex-review
    if: github.event_name == 'pull_request' && needs.codex-review.outputs.final_message != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post Codex PR comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });

  post-commit-review:
    needs: codex-review
    if: github.event_name == 'push' && needs.codex-review.outputs.final_message != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Post Codex commit comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
