services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: buypilot
      POSTGRES_PASSWORD: buypilot
      POSTGRES_DB: buypilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buypilot -d buypilot"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://buypilot:buypilot@postgres:5432/buypilot
      ECOMMERCE_DATASET_DIR: /data/raw/ecommerce_agent_dataset
      AUTO_SEED_ON_STARTUP: "1"
      AUTO_SEED_STRICT_EMBEDDINGS: "1"
    volumes:
      - ../backend/src:/app/src
      - ../data:/data:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
