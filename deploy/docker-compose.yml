services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buypilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buypilot}
      POSTGRES_DB: ${POSTGRES_DB:-buypilot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --proxy-headers
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-buypilot}:${POSTGRES_PASSWORD:-buypilot}@postgres:5432/${POSTGRES_DB:-buypilot}
      ECOMMERCE_DATASET_DIR: /data/raw/ecommerce_agent_dataset
      UPLOAD_DIR: /app/uploads
      AUTO_SEED_ON_STARTUP: "1"
      AUTO_SEED_STRICT_EMBEDDINGS: "1"
    volumes:
      - ../data:/data:ro
      - ../backend/static:/app/static:ro
      - api_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  pgdata:
  api_uploads:
