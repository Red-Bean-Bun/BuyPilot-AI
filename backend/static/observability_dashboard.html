<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Stream Observer</title>
<style>
/* ═══════════════════════════════════════════════
   Glassmorphism dashboard — frosted glass cards
   with soft glowing background orbs.
   ═══════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}

body{
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  font-size: 14px;
  line-height: 1.6;
  color: #1e293b;
  background: linear-gradient(135deg, #f5f3ff 0%, #eef2ff 30%, #f0f9ff 60%, #fdf2f8 100%);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
}
/* ── Background decorative orbs ───────────────── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 600px 400px at 15% 20%, rgba(139,92,246,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 500px 350px at 85% 75%, rgba(59,130,246,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 50%, rgba(236,72,153,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 350px 300px at 75% 10%, rgba(34,197,94,0.07) 0%, transparent 70%);
}

.mono{font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;font-size:12px}

/* ── Header (glass bar) ───────────────────────── */
.gf-header{
  display:flex;align-items:center;gap:16px;
  height:52px;padding:0 24px;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid rgba(0,0,0,0.06);
  position:relative;z-index:20;
}
.gf-brand{
  font-size:15px;font-weight:700;color:#1e293b;
  white-space:nowrap;display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  flex-shrink:0;
}
.gf-brand-sub{
  color:#8b5cf6;font-weight:500;
  -webkit-text-fill-color:#8b5cf6;
}
.gf-search{display:flex;gap:8px;flex:1;max-width:480px;margin-left:auto;align-items:center}
.gf-input{
  height:36px;padding:0 14px;
  background:rgba(255,255,255,0.6);border:1px solid rgba(0,0,0,0.08);
  border-radius:18px;
  color:#1e293b;font:13px ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;
  outline:none;flex:1;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:all .2s;
}
.gf-input::placeholder{color:#94a3b8}
.gf-input:focus{
  border-color:rgba(99,102,241,0.4);
  box-shadow:0 0 0 4px rgba(99,102,241,0.1);
  background:rgba(255,255,255,0.85);
}
.gf-btn{
  height:36px;padding:0 16px;border:none;
  border-radius:18px;
  font:500 13px inherit;cursor:pointer;white-space:nowrap;
  transition:all .2s;
}
.gf-btn-primary{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;box-shadow:0 2px 8px rgba(99,102,241,0.25);
}
.gf-btn-primary:hover{box-shadow:0 4px 16px rgba(99,102,241,0.35);transform:translateY(-1px)}
.gf-btn-ghost{
  background:rgba(255,255,255,0.5);color:#64748b;
  border:1px solid rgba(0,0,0,0.08);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.gf-btn-ghost:hover{background:rgba(255,255,255,0.8);color:#1e293b;border-color:rgba(0,0,0,0.12)}
.gf-filter{
  display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;
  font-size:12px;color:#64748b;white-space:nowrap;
  padding:0 4px;
}
.gf-filter input[type=checkbox]{accent-color:#6366f1;width:14px;height:14px;cursor:pointer}
.gf-filter:hover{color:#1e293b}

/* ── Layout ────────────────────────────────────── */
.gf-main{display:flex;height:calc(100vh - 52px);position:relative;z-index:1}

/* ── Sidebar (glass panel) ─────────────────────── */
.gf-side{
  width:244px;min-width:244px;
  background:rgba(255,255,255,0.45);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border-right:1px solid rgba(0,0,0,0.05);
  display:flex;flex-direction:column;
}
.gf-side-head{
  padding:12px 18px;font-size:11px;color:#94a3b8;
  border-bottom:1px solid rgba(0,0,0,0.05);
  display:flex;justify-content:space-between;
  letter-spacing:.6px;text-transform:uppercase;font-weight:600;
}
.gf-side-list{flex:1;overflow-y:auto}

/* request row */
.row{
  padding:10px 16px;
  border-bottom:1px solid rgba(0,0,0,0.03);
  border-left:3px solid transparent;
  cursor:pointer;transition:all .15s;
}
.row:hover{background:rgba(99,102,241,0.06)}
.row.on{
  border-left-color:#8b5cf6;
  background:linear-gradient(90deg,rgba(99,102,241,0.1) 0%,rgba(139,92,246,0.04) 100%);
}
.row-path{font:12px ui-monospace,SFMono-Regular,'SF Mono',Menlo,monospace;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.row-meta{font-size:11px;color:#94a3b8;margin-top:3px;display:flex;gap:8px;align-items:center}
.row-id{font:10px ui-monospace,SFMono-Regular,'SF Mono',Menlo,monospace;color:#c0c8d4;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── Content ───────────────────────────────────── */
.gf-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* tabs: glass bar */
.gf-tabs{
  display:flex;height:44px;align-items:stretch;gap:4px;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.05);padding:0 24px;
}
.tab{
  padding:0 18px;font-size:13px;color:#64748b;
  cursor:pointer;border-bottom:2px solid transparent;
  display:flex;align-items:center;gap:6px;transition:all .15s;font-weight:500;
}
.tab:hover{color:#334155}
.tab.on{color:#6366f1;border-bottom-color:#8b5cf6}
.tab-n{
  font:11px ui-monospace,monospace;color:#94a3b8;
  background:rgba(0,0,0,0.04);border-radius:10px;padding:1px 7px;line-height:18px;
}
.tab.on .tab-n{color:#fff;background:linear-gradient(135deg,#6366f1,#8b5cf6)}

.gf-panel{flex:1;overflow-y:auto;padding:24px;position:relative}

/* ── Stat cards (glass) ────────────────────────── */
.stat-row{
  display:flex;gap:16px;padding:0 0 24px;margin-bottom:24px;
  border-bottom:1px solid rgba(0,0,0,0.05);
}
.stat{
  flex:1;min-width:0;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.8);
  border-radius:16px;padding:18px 22px;
  box-shadow:0 4px 16px rgba(0,0,0,0.04),0 1px 3px rgba(0,0,0,0.03);
  position:relative;overflow:hidden;
}
/* subtle top accent bar */
.stat::before{
  content:'';position:absolute;top:0;left:16px;right:16px;height:3px;
  border-radius:0 0 3px 3px;
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
  opacity:0.4;
}
.stat:nth-child(2)::before{background:linear-gradient(90deg,#3b82f6,#06b6d4)}
.stat:nth-child(3)::before{background:linear-gradient(90deg,#22c55e,#10b981)}
.stat:nth-child(4)::before{background:linear-gradient(90deg,#f59e0b,#f97316)}
.stat:nth-child(5)::before{background:linear-gradient(90deg,#ec4899,#f43f5e)}
.stat:nth-child(6)::before{background:linear-gradient(90deg,#6366f1,#a855f7)}
.stat-lbl{font-size:11px;color:#94a3b8;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.stat-val{font:700 28px/1.2 ui-monospace,SFMono-Regular,'SF Mono',Menlo,monospace;color:#1e293b}
.stat-val.warn{color:#f59e0b}
.stat-val.err{color:#ef4444}
.stat-val.ok{color:#22c55e}
.stat-val.muted{font-size:12px;font-weight:500;color:#94a3b8}

/* ── Panel card (glass) ────────────────────────── */
.pnl{
  border:1px solid rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-radius:14px;margin-bottom:14px;
  box-shadow:0 4px 16px rgba(0,0,0,0.03),0 1px 3px rgba(0,0,0,0.02);
  overflow:hidden;
}
.pnl-head{
  padding:12px 18px;font-size:12px;font-weight:600;color:#475569;
  border-bottom:1px solid rgba(0,0,0,0.05);
  display:flex;justify-content:space-between;align-items:center;
  letter-spacing:.2px;
  background:rgba(255,255,255,0.3);
}
.pnl-body{padding:16px 18px}

/* ── Timing bars ───────────────────────────────── */
.tmr{display:flex;align-items:center;gap:12px;margin-bottom:8px;font:12px ui-monospace,monospace}
.tmr-lbl{width:120px;text-align:right;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.tmr-track{flex:1;height:20px;background:rgba(0,0,0,0.04);border-radius:10px;overflow:hidden}
.tmr-fill{height:100%;border-radius:10px;display:flex;align-items:center;padding:0 8px;font-size:10px;color:#fff;white-space:nowrap;
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
}
.tmr-fill.slow{background:linear-gradient(90deg,#fca5a5,#f87171)}
.tmr-fill.med{background:linear-gradient(90deg,#fcd34d,#fbbf24)}
.tmr-num{width:68px;color:#64748b;text-align:right;font-weight:500}

/* ── Data table ────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{
  text-align:left;padding:10px 14px;font-weight:600;
  color:#64748b;font-size:11px;letter-spacing:.4px;text-transform:uppercase;
  border-bottom:2px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.4);
  position:sticky;top:0;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.tbl td{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.04);vertical-align:top}
.tbl tr:hover td{background:rgba(99,102,241,0.04)}

/* ── Collapsible ───────────────────────────────── */
.collapse{cursor:pointer;user-select:none;transition:background .1s}
.collapse:hover{background:rgba(99,102,241,0.04)}
.collapse-arrow{display:inline-block;width:14px;color:#94a3b8;font-size:11px}
.collapse-body{display:none;border-top:1px solid rgba(0,0,0,0.04);background:rgba(0,0,0,0.01)}
.collapse-body.open{display:block}

/* ── JSON block ────────────────────────────────── */
pre.json{
  background:rgba(15,23,42,0.03);padding:12px;border-radius:8px;
  font:11px ui-monospace,SFMono-Regular,'SF Mono',Menlo,monospace;
  overflow-x:auto;max-height:300px;overflow-y:auto;line-height:1.7;color:#334155;
  white-space:pre-wrap;word-break:break-all;border:1px solid rgba(0,0,0,0.06);
}

/* ── Status text ───────────────────────────────── */
.s-ok{color:#22c55e}.s-warn{color:#f59e0b}.s-err{color:#ef4444}.s-info{color:#94a3b8}

/* ── Diagnostic row ────────────────────────────── */
.diag{
  border-left:3px solid #f59e0b;margin-bottom:10px;
  background:rgba(251,191,36,0.06);border-radius:0 10px 10px 0;
}
.diag.sev-error{border-left-color:#ef4444;background:rgba(239,68,68,0.05)}
.diag-body{padding:12px 18px}
.diag-code{font:12px ui-monospace,monospace;color:#f59e0b;font-weight:700}
.diag.sev-error .diag-code{color:#ef4444}
.diag-kv{font-size:12px;display:flex;gap:10px;margin-top:4px}
.diag-k{color:#94a3b8;min-width:120px;font-weight:500}

/* ── Inline labels ─────────────────────────────── */
.lbl{color:#94a3b8;font-size:11px;font-family:ui-monospace,monospace}

/* ── Empty / loading states ────────────────────── */
.empty{color:#c0c8d4;font-size:14px;padding:48px 0;text-align:center}
.loading{color:#94a3b8;font-size:14px;padding:32px 0;text-align:center}
.inline-btn{background:none;border:none;color:#6366f1;cursor:pointer;font:inherit;padding:0;text-decoration:none;font-weight:600}
.inline-btn:hover{color:#4f46e5;text-decoration:underline}

/* ── Scrollbar (thin, translucent) ─────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.2)}

/* ── Error box ─────────────────────────────────── */
.err-box{
  padding:8px 14px;font-size:12px;color:#ef4444;
  border-left:3px solid #ef4444;margin-top:10px;
  background:rgba(239,68,68,0.05);border-radius:0 8px 8px 0;
}

</style>
</head>
<body>

<div class="gf-header">
  <div class="gf-brand">Chat Stream <span class="gf-brand-sub">Observer</span></div>
  <div class="gf-search">
    <label id="filterToggle" class="gf-filter" title="只显示 Chat 请求">
      <input type="checkbox" id="filterChatOnly" onchange="loadRecentRequests()" />
      <span>仅 Chat</span>
    </label>
    <input id="searchInput" class="gf-input" type="text" placeholder="turn_id / session_id" />
    <button class="gf-btn gf-btn-primary" onclick="handleSearch()">查询</button>
    <button class="gf-btn gf-btn-ghost" onclick="loadRecentRequests()">刷新</button>
  </div>
</div>

<div class="gf-main">
  <div class="gf-side">
    <div class="gf-side-head">
      <span>请求</span>
      <span id="reqCount">-</span>
    </div>
    <div class="gf-side-list" id="requestList">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <div class="gf-body">
    <div class="gf-tabs" id="tabBar">
      <div class="tab on" data-tab="overview">概览</div>
      <div class="tab" data-tab="llm">LLM <span class="tab-n" id="llmN"></span></div>
      <div class="tab" data-tab="sse">SSE <span class="tab-n" id="sseN"></span></div>
      <div class="tab" data-tab="diag">诊断 <span class="tab-n" id="diagN"></span></div>
      <div class="tab" data-tab="audit">审计</div>
    </div>
    <div class="gf-panel" id="tabContent">
      <div class="empty">选择左侧请求或输入 ID 查询</div>
    </div>
  </div>
</div>

<script>
const API = '/admin/observability';
const adminToken = new URLSearchParams(window.location.search).get('token') || '';
let bundle = null, tab = 'overview';

/* ── Utilities ──────────────────────────────── */

function escapeHtml(value){
  if(value===null||value===undefined)return'';
  return String(value).replace(/[&<>"']/g,ch=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}

function hlJson(obj){
  if(obj==null)return'<span style="color:#555">null</span>';
  const s=(typeof obj==='string'?obj:JSON.stringify(obj,null,2));
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)"(?=\s*:)/g,'<span style="color:#5ea3f5">"$1"</span>')
    .replace(/:\s*"([^"]*)"/g,': <span style="color:#4caf50">"$1"</span>')
    .replace(/:\s*(\d+\.?\d*)/g,': <span style="color:#e8a838">$1</span>')
    .replace(/:\s*(true|false|null)/g,': <span style="color:#8e8e8e">$1</span>');
}

function jblock(obj){return obj?'<pre class="json">'+hlJson(obj)+'</pre>':'<span style="color:#555">null</span>'}

function timeAgo(iso){
  if(!iso)return'';
  const d=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(d<60)return d+'s ago';
  if(d<3600)return Math.floor(d/60)+'m ago';
  if(d<86400)return Math.floor(d/3600)+'h ago';
  return new Date(iso).toLocaleDateString('zh-CN');
}

function fmtMs(ms){
  if(ms==null)return'-';
  return ms<1000?ms.toFixed(0)+'ms':(ms/1000).toFixed(2)+'s';
}

function statusCls(s){return s==='success'?'s-ok':s==='failed'?'s-err':s==='fallback'?'s-warn':'s-info'}

function sevCls(s){return s==='error'?'s-err':s==='warning'?'s-warn':'s-info'}

function evtColor(t){
  return({error:'#d94a38',done:'#4caf50',text_delta:'#4caf50',thinking:'#8e8e8e',clarification:'#e8a838'})[t]||'#8e8e8e';
}

function togglePanel(el){
  const arrow=el.querySelector('.collapse-arrow');
  const body=el.nextElementSibling;
  if(!body)return;
  const open=body.classList.toggle('open');
  if(arrow)arrow.textContent=open?'▼':'▶';
}

/* ── API calls ─────────────────────────────── */

async function fetchJson(url){
  const options = adminToken ? {headers:{Authorization:'Bearer '+adminToken}} : {};
  const r=await fetch(url, options);
  if(!r.ok)throw new Error('HTTP '+r.status+': '+r.statusText);
  return r.json();
}

async function loadRecentRequests(){
  const list=document.getElementById('requestList');
  list.innerHTML='<div class="loading">加载中...</div>';
  try{
    let reqs=await fetchJson(API+'/requests?limit=50');
    const chatOnly=document.getElementById('filterChatOnly').checked;
    if(chatOnly){
      reqs=reqs.filter(r=>r.turn_id||r.session_id);
    }
    document.getElementById('reqCount').textContent=reqs.length;
    if(!reqs.length){list.innerHTML='<div class="empty">暂无请求</div>';return}
    list.replaceChildren(...reqs.map(r=>{
      const sessionId=r.session_id||'';
      const targetKind=r.turn_id?'turn':(sessionId?'session':'');
      const targetId=r.turn_id||sessionId||'';
      const displayId=targetId||(r.trace_id||r.request_id||'-');
      const sc=Number(r.status_code||0);
      const ok=sc>=200&&sc<300;
      const item=document.createElement('div');
      item.className='row';item.dataset.key=targetId;
      if(targetKind==='turn')item.addEventListener('click', () => loadTurn(targetId));
      else if(targetKind==='session')item.addEventListener('click', () => loadSession(targetId));
      const path=document.createElement('div');
      path.className='row-path mono';
      path.textContent=(r.method||'GET')+' '+(r.path||'-');
      const meta=document.createElement('div');
      meta.className='row-meta';
      const statusEl=document.createElement('span');
      statusEl.style.color=ok?'#4caf50':'#d94a38';
      statusEl.textContent=r.status_code||'-';
      const durEl=document.createElement('span');
      durEl.textContent=r.duration_ms?fmtMs(r.duration_ms):'';
      const timeEl=document.createElement('span');
      timeEl.textContent=timeAgo(r.created_at);
      meta.append(statusEl,durEl,timeEl);
      const id=document.createElement('div');
      id.className='row-id mono';
      id.textContent = targetKind ? targetKind+': '+displayId : displayId;
      item.append(path,meta,id);
      return item;
    }));
  }catch(e){
    list.innerHTML='<div class="empty" style="color:#d94a38">'+escapeHtml(e.message)+'</div>';
  }
}

async function loadTurn(id){
  if(!id||id==='-')return;
  document.querySelectorAll('.row').forEach(el=>el.classList.toggle('on',el.dataset.key===id));
  const p=document.getElementById('tabContent');
  p.innerHTML='<div class="loading">加载 turn...</div>';
  try{bundle=await fetchJson(API+'/turns/'+encodeURIComponent(id));updateBadge();render()}
  catch(e){p.innerHTML='<div class="empty" style="color:#d94a38">加载失败: '+escapeHtml(e.message)+'</div>'}
}

async function loadSession(id){
  if(!id||id==='-')return;
  document.querySelectorAll('.row').forEach(el=>el.classList.toggle('on',el.dataset.key===id));
  const p=document.getElementById('tabContent');
  p.innerHTML='<div class="loading">加载 session...</div>';
  try{bundle=await fetchJson(API+'/sessions/'+encodeURIComponent(id));updateBadge();render()}
  catch(e){p.innerHTML='<div class="empty" style="color:#d94a38">加载失败: '+escapeHtml(e.message)+'</div>'}
}

function handleSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  if(q.startsWith('turn_'))loadTurn(q);
  else if(q.startsWith('session_')||q.includes('_session_'))loadSession(q);
  else loadTurn(q);
}
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleSearch()});

document.getElementById('tabBar').addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  tab=t.dataset.tab;
  if(bundle)render();
});

function updateBadge(){
  if(!bundle)return;
  const set=(id,n)=>{const e=document.getElementById(id);if(e)e.textContent=n||''};
  set('llmN',(bundle.llm_calls||[]).length);
  set('sseN',(bundle.sse_events||[]).length);
  set('diagN',(bundle.context_diagnostics||[]).length);
}

function render(){
  const p=document.getElementById('tabContent');
  if(!bundle)return;
  p.innerHTML=(
    {overview:renderOverview,llm:renderLLM,sse:renderSSE,diag:renderDiag,audit:renderAudit}
    [tab]||renderOverview
  )(bundle);
}

/* ── Overview ─────────────────────────────── */

function renderOverview(b){
  const req=(b.requests||[])[0]||{};
  const llmC=(b.llm_calls||[]).length;
  const sseC=(b.sse_events||[]).length;
  const diagC=(b.context_diagnostics||[]).length;
  const dur=req.duration_ms||0;
  const sc=Number(req.status_code||0);

  let timings={};
  for(const e of(b.audit_events||[])){
    if(e.action==='chat.turn_completed'&&e.metadata?.stage_timings_ms){
      timings=e.metadata.stage_timings_ms;break;
    }
  }
  const entries=Object.entries(timings);
  const maxT=Math.max(...entries.map(([,v])=>Number(v)||0),1);

  let timingHtml='';
  for(const[stage,ms]of entries){
    const m=Number(ms)||0;
    const pct=(m/maxT*100).toFixed(0);
    const cls=m>=3000?'slow':m>=1000?'med':'';
    timingHtml+=
      '<div class="tmr">'+
        '<span class="tmr-lbl">'+escapeHtml(stage)+'</span>'+
        '<div class="tmr-track"><div class="tmr-fill '+cls+'" style="width:'+Math.max(pct,2)+'%"></div></div>'+
        '<span class="tmr-num">'+fmtMs(m)+'</span>'+
      '</div>';
  }

  return(
    '<div class="stat-row">'+
      '<div class="stat"><div class="stat-lbl">Turn ID</div><div class="stat-val muted">'+escapeHtml(b.turn_id||'-')+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">总耗时</div><div class="stat-val warn">'+fmtMs(dur)+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">LLM</div><div class="stat-val">'+llmC+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">SSE</div><div class="stat-val">'+sseC+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">诊断</div><div class="stat-val '+(diagC?'warn':'ok')+'">'+diagC+'</div></div>'+
      '<div class="stat"><div class="stat-lbl">状态</div><div class="stat-val '+(sc>=200&&sc<300?'ok':'err')+'">'+(req.status_code||'-')+'</div></div>'+
    '</div>'+
    (entries.length?(
      '<div class="pnl"><div class="pnl-head">阶段耗时</div><div class="pnl-body">'+timingHtml+'</div></div>'
    ):'')+
    '<div class="pnl"><div class="pnl-head">请求详情</div><div class="pnl-body">'+jblock(req)+'</div></div>'
  );
}

/* ── LLM Calls ────────────────────────────── */

function renderLLM(b){
  const calls=b.llm_calls||[];
  if(!calls.length)return'<div class="empty">暂无 LLM 调用</div>';
  return calls.map(c=>{
    const task=escapeHtml(c.task||'-');
    const st=statusCls(c.status);
    let content='';
    if(c.prompt_preview||c.prompt_json){
      const t=c.prompt_json||c.prompt_preview;
      content+='<div style="padding:4px 12px;cursor:pointer;color:#5ea3f5;font-size:11px" onclick="togglePanel(this)"><span class="collapse-arrow">▶</span> Prompt ('+(t||'').length+' chars)</div><div class="collapse-body">'+jblock(t)+'</div>';
    }
    if(c.response_preview||c.response_json){
      const t=c.response_json||c.response_preview;
      content+='<div style="padding:4px 12px;cursor:pointer;color:#5ea3f5;font-size:11px" onclick="togglePanel(this)"><span class="collapse-arrow">▶</span> Response ('+(t||'').length+' chars)</div><div class="collapse-body">'+jblock(t)+'</div>';
    }
    if(c.parsed_json){
      content+='<div style="padding:6px 12px"><div style="color:#666;font-size:10px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px">Parsed</div>'+jblock(c.parsed_json)+'</div>';
    }
    if(c.error_type||c.error_message){
      content+='<div class="err-box"><strong>'+escapeHtml(c.error_type||'Error')+'</strong>: '+escapeHtml(c.error_message||'')+'</div>';
    }
    if(c.validation_error){
      content+='<div class="err-box">Validation: '+escapeHtml(c.validation_error)+'</div>';
    }
    return(
      '<div class="pnl">'+
        '<div class="pnl-head collapse" onclick="togglePanel(this)">'+
          '<span><span class="collapse-arrow">▶</span> <strong>'+task+'</strong> '+
          '<span class="lbl">'+escapeHtml(c.provider||'-')+'</span> '+
          '<span class="lbl">· '+escapeHtml(c.profile||'-')+'</span> '+
          '<span class="lbl">· '+escapeHtml(c.model||'-')+'</span>'+
          (c.fallback_from?' <span class="lbl">· fallback ← '+escapeHtml(c.fallback_from)+'</span>':'')+
          '</span>'+
          '<span class="'+st+'" style="font-weight:600">'+fmtMs(c.duration_ms)+' · '+escapeHtml(c.status||'-')+'</span>'+
        '</div>'+
        '<div class="collapse-body">'+content+'</div>'+
      '</div>'
    );
  }).join('');
}

/* ── SSE Events (table, Logs panel style) ─── */

function renderSSE(b){
  const evts=b.sse_events||[];
  if(!evts.length)return'<div class="empty">暂无 SSE 事件</div>';
  const rows=evts.map(e=>{
    const details=[];
    if(e.stage)details.push('stage='+escapeHtml(e.stage));
    if(e.deck_id)details.push('deck='+escapeHtml(e.deck_id));
    if(e.criteria_id)details.push('criteria='+escapeHtml(e.criteria_id));
    if(e.message_id)details.push('msg='+escapeHtml(e.message_id));
    if(e.product_ids&&e.product_ids.length)details.push('products=['+e.product_ids.map(escapeHtml).join(',')+']');
    if(e.finish_reason)details.push('finish='+escapeHtml(e.finish_reason));
    if(e.delta_preview)details.push('delta="'+escapeHtml(e.delta_preview.slice(0,60))+(e.delta_preview.length>60?'...':'')+'"');
    return(
      '<tr>'+
        '<td class="mono" style="color:#555">#'+escapeHtml(e.seq)+'</td>'+
        '<td><span style="color:'+evtColor(e.event_type)+'">'+escapeHtml(e.event_type||'-')+'</span></td>'+
        '<td class="mono" style="color:#555">'+(e.created_at?new Date(e.created_at).toLocaleTimeString('zh-CN'):'')+'</td>'+
        '<td class="mono" style="color:#666">'+details.join(' · ')+'</td>'+
      '</tr>'
    );
  }).join('');
  return '<table class="tbl"><thead><tr><th>#</th><th>Type</th><th>Time</th><th>Details</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

/* ── Diagnostics ──────────────────────────── */

function renderDiag(b){
  const d=b.context_diagnostics||[];
  if(!d.length)return'<div class="empty" style="color:#4caf50">无诊断警告 - 多轮约束传递正常</div>';
  return d.map(x=>{
    const m=x.metadata||x;
    const sev=m.severity||'warning';
    const fields=Object.entries(m).filter(([k])=>!['diagnostic_code','severity'].includes(k));
    return(
      '<div class="pnl diag sev-'+sev+'"><div class="diag-body">'+
        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">'+
          '<span class="diag-code">'+escapeHtml(m.diagnostic_code||'-')+'</span>'+
          '<span class="'+sevCls(sev)+'">['+escapeHtml(sev)+']</span>'+
        '</div>'+
        fields.map(([k,v])=>
          '<div class="diag-kv"><span class="diag-k">'+escapeHtml(k)+'</span><span class="mono">'+escapeHtml(typeof v==='object'?JSON.stringify(v):v)+'</span></div>'
        ).join('')+
      '</div></div>'
    );
  }).join('');
}

/* ── Audit (table with collapsible metadata) ── */

function renderAudit(b){
  const evts=b.audit_events||[];
  if(!evts.length)return'<div class="empty">暂无审计事件</div>';
  const rows=evts.map((e,i)=>{
    let metaCell='-';
    if(e.metadata){
      const preview=JSON.stringify(e.metadata);
      metaCell=preview.length>80?
        '<span class="mono" style="color:#666">'+escapeHtml(preview.slice(0,80))+'...</span> <button class="inline-btn" onclick="expandAuditMeta(this,'+i+')">展开</button>':
        '<span class="mono" style="color:#666">'+escapeHtml(preview)+'</span>';
    }
    return(
      '<tr>'+
        '<td class="mono" style="font-size:11px;white-space:nowrap">'+(e.created_at?new Date(e.created_at).toLocaleTimeString('zh-CN'):'-')+'</td>'+
        '<td class="mono">'+escapeHtml(e.action||'-')+'</td>'+
        '<td>'+escapeHtml(e.resource_type||'-')+(e.resource_id?'<br><span class="mono" style="color:#555;font-size:10px">'+escapeHtml(e.resource_id)+'</span>':'')+'</td>'+
        '<td>'+metaCell+'</td>'+
      '</tr>'
    );
  }).join('');
  return '<table class="tbl"><thead><tr><th>时间</th><th>Action</th><th>Resource</th><th>Metadata</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

function expandAuditMeta(btn,idx){
  const meta=(bundle.audit_events||[])[idx]?.metadata;
  if(!meta)return;
  const cell=btn.closest('td');
  cell.innerHTML='<pre class="json">'+hlJson(meta)+'</pre>';
}

/* ── Init ─────────────────────────────────── */
loadRecentRequests();
</script>
