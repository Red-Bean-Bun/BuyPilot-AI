task_model_map:
  analyze_intent:
    primary: qwen_turbo
    fallback: doubao_intent
  generate_criteria:
    primary: qwen_turbo
    fallback: doubao_generation
  generate_recommendation:
    primary: qwen_turbo
    fallback: doubao_generation
  generate_decision:
    primary: qwen_turbo
    fallback: doubao_generation
  generate_comparison:
    primary: qwen_turbo
    fallback: doubao_generation
  generate_strategy_narration:
    primary: qwen_turbo
    fallback: doubao_generation
  analyze_image:
    primary: qwen_vl_plus
    fallback: null
  embedding:
    primary: qwen_embedding
    fallback: null
  rerank:
    primary: gte_rerank
    fallback: null
  vl_embedding:
    primary: qwen3_vl_embedding
    fallback: null

profiles:
  doubao_intent:
    provider: doubao
    model: doubao-seed-2.0-lite
    base_url_env: DOUBAO_BASE_URL
    api_key_env: DOUBAO_API_KEY
    timeout_seconds: 20
  doubao_generation:
    provider: doubao
    model: doubao-seed-1.6
    base_url_env: DOUBAO_BASE_URL
    api_key_env: DOUBAO_API_KEY
    timeout_seconds: 30
  doubao_embedding:
    provider: doubao
    model: doubao-embedding-vision
    base_url_env: DOUBAO_BASE_URL
    api_key_env: DOUBAO_API_KEY
    timeout_seconds: 20
  qwen_turbo:
    provider: bailian
    model: qwen-turbo
    base_url_env: BAILIAN_BASE_URL
    api_key_env: BAILIAN_API_KEY
    timeout_seconds: 20
  qwen3_turbo:
    provider: bailian
    model: qwen3-turbo
    base_url_env: BAILIAN_BASE_URL
    api_key_env: BAILIAN_API_KEY
    timeout_seconds: 20
  qwen_plus:
    provider: bailian
    model: qwen-plus
    base_url_env: BAILIAN_BASE_URL
    api_key_env: BAILIAN_API_KEY
    timeout_seconds: 30
  qwen_vl_plus:
    provider: bailian
    model: qwen-vl-plus
    base_url_env: BAILIAN_BASE_URL
    api_key_env: BAILIAN_API_KEY
    timeout_seconds: 40
  qwen_embedding:
    provider: bailian
    model: text-embedding-v3
    dimensions: 1024
    base_url_env: BAILIAN_BASE_URL
    api_key_env: BAILIAN_API_KEY
    timeout_seconds: 20
  gte_rerank:
    provider: bailian
    model: qwen3-rerank
    base_url: https://dashscope.aliyuncs.com/api/v1/services
    endpoint_path: /rerank/text-rerank/text-rerank
    api_key_env: BAILIAN_API_KEY
    timeout_seconds: 20
  qwen3_vl_embedding:
    provider: bailian
    model: qwen3-vl-embedding
    dimensions: 1024
    base_url: https://dashscope.aliyuncs.com/api/v1/services
    endpoint_path: /embeddings/multimodal-embedding/multimodal-embedding
    api_key_env: BAILIAN_API_KEY
    timeout_seconds: 30
